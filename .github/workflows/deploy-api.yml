name: Deploy API

# Déploie l'API sur la prod en lançant ./deploy.sh sur le serveur.
# Le script (côté serveur) fait : git fetch --tags, checkout du dernier tag,
# composer install --no-dev, migrations Doctrine, cache:clear.
#  - push d'un tag `vX.Y.Z` -> déploiement automatique
#  - lancement manuel        -> redéploie le dernier tag présent sur origin

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Un seul déploiement à la fois pour éviter deux ./deploy.sh concurrents
# (composer / migrations) sur le serveur.
concurrency:
  group: deploy-api
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH key
        run: |
          install -m 700 -d ~/.ssh
          install -m 600 /dev/stdin ~/.ssh/id_villard <<< "${{ secrets.SSH_PRIVATE_KEY }}"
          ssh-keyscan -p "${{ vars.SSH_PORT }}" -H "${{ vars.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Run deploy.sh on the server
        env:
          SSH_HOST: ${{ vars.SSH_HOST }}
          SSH_USER: ${{ vars.SSH_USER }}
          SSH_PORT: ${{ vars.SSH_PORT }}
          APP_DIR: ${{ vars.API_APP_DIR }}
        run: |
          ssh -i ~/.ssh/id_villard -p "${SSH_PORT}" \
            -o IdentitiesOnly=yes -o BatchMode=yes \
            "${SSH_USER}@${SSH_HOST}" \
            "cd '${APP_DIR}' && ./deploy.sh"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_villard
